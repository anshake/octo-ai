spring:

  application:
    name: local-assistant

  threads:
    virtual:
      enabled: true

  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        model: ${CHAT_MODEL:claude-haiku-4-5}

gateway:
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN}
    allowed-user-ids:
      - ${TELEGRAM_ALLOWED_USER_ID}
